<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber-Tank Arena: Nomads</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div id="hud-top">
      <div class="hud-block">Score: <span id="score-val">0</span></div>
      <div class="hud-block">Wave: <span id="wave-val">1</span></div>
      <div class="hud-block">Enemy: <span id="enemies-val">0</span></div>
      <div class="hud-block">XP: <span id="xp-val">0</span></div>
    </div>

    <div id="hp-bar-wrap">
      <div id="hp-label">HP armor</div>
      <div id="hp-bar-bg"><div id="hp-bar"></div></div>
    </div>

    <div id="crosshair"></div>
    <div id="wave-announce"></div>
    <div id="lights-indicator">Headlights: ВКЛ [L]</div>

    <div id="controls-hint" aria-label="Game controls">
      <span>WASD / Arrows — move</span>
      <span>Mouse — aim</span>
      <span>LMB — fire</span>
      <span>L — headlights</span>
      <span>X — wireframe</span>
      <span>Tab — config</span>
    </div>

    <div id="game-over">
      <h1>NOMAD FALLEN</h1>
      <div class="sub">you have fallen</div>
      <div class="stats" id="final-stats"></div>
      <button id="restart-btn">⟳ To be reborn </button>
    </div>

    <div id="low-hp-overlay"></div>

    <div id="config-panel" style="display:none;">
      <h3>CONFIG</h3>
      <label>Tank<br><input type="color" id="cfg-tank" value="#f97316"></label>
      <label>Bullet<br><input type="color" id="cfg-bullet" value="#ff8800"></label>
      <label>Ambient<br><input type="color" id="cfg-ambient" value="#8899cc"></label>
      <label>Accent<br><input type="color" id="cfg-accent" value="#f97316"></label>
      <label>View
        <select id="cfg-camera">
          <option value="0" selected>Default</option>
          <option value="1">Chase</option>
          <option value="2">Orbit</option>
        </select>
      </label>
      <label>Difficulty
        <select id="cfg-difficulty">
          <option value="0.7">Easy</option>
          <option value="1" selected>Normal</option>
          <option value="1.5">Hard</option>
        </select>
      </label>
      <div class="cfg-hint">TAB — toggle</div>
    </div>
  </div>

  <!-- CDN  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
